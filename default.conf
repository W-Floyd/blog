server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Fingerprinted assets (Hugo content-hashed: *.min.<hash>.css/js).
    # Hash changes when content changes, so cache forever + immutable.
    location ~* "\.[0-9a-f]{20,}\.(css|js)$" {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Static media with stable names — long cache, but revalidate.
    # (favicons, og images, fonts, etc. Bump by replacing the file.)
    location ~* "\.(svg|png|jpg|jpeg|webp|avif|gif|ico|woff2?|ttf|otf)$" {
        add_header Cache-Control "public, max-age=2592000";  # 30 days
        access_log off;
        try_files $uri =404;
    }

    # HTML, RSS, manifest, sitemap — always revalidate so updates show.
    location / {
        add_header Cache-Control "no-cache";   # etag still serves cheap 304s
        try_files $uri $uri/ =404;
    }

    error_page  404              /404.html;
    error_page  500 502 503 504  /50x.html;
    location = /50x.html {
        internal;
    }
}